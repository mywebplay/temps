<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Copy JS Code</title>
    <style>
      body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f9f9f9;
      overflow: hidden;
      background-color : #272822;
      }
      .code-container {
      position: relative;
      background: #272822;
      color: #f8f8f2;
      padding: 15px 50px 15px 15px;
      border-radius: 8px;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      }
      .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      }
      .copy-btn:active {
      background: #45a049;
      }
      .copy-btn.copied::after {
      content: " ✓";
      }
    </style>
    <style>
      body {
          margin: 0;
          padding: 10px;
          background: transparent;
          font-family: Arial, sans-serif;
      }
      
      .code-container {
          margin-bottom: 12px;
      }
      
      .code-label {
          font-size: 20px;
          font-weight: 700;
          color: #ffffff;
          margin-bottom: 5px;
      }
      
      .code-box {
          position: relative;
          background: #111827;
          border: 1px solid #374151;
          border-radius: 10px;
          padding: 10px;
          overflow-x: auto;
      }
      
      .code-box code {
          display: block;
          white-space: pre-wrap;
          word-break: break-word;
          color: #d1fae5;
          font-size: 15px;
          line-height: 1.45;
          font-family: Consolas, monospace;
          padding-right: 60px;
      }
      
      .copy-btn {
          position: absolute;
          top: 6px;
          right: 6px;
          border: none;
          background: #10b981;
          color: white;
          font-size: 10px;
          font-weight: 700;
          padding: 3px 7px;
          border-radius: 5px;
          cursor: pointer;
          transition: 0.2s ease;
      }
      
      .copy-btn:hover {
          background: #059669;
      }
      </style>
      <style>
    .copy-btn
    {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 999px;
        background: transparent;
        cursor: pointer;
        transition: 0.2s;
        color: #444;
    }
    
    .copy-btn:hover
    {
        background: rgba(0,0,0,0.08);
    }
    
    .copy-btn svg
    {
        width: 25px;
        height: 25px;
    }
    </style>
  </head>
  <body>
    <div class="code-container">
      <div class="code-label">Lấy nội dung body của tài liệu</div>
  
      <div class="code-box">
        <button class="copy-btn" onclick="copyTextExec(`var bvl_result = document.getElementById(&quot;page-container-wrapper&quot;).outerHTML;
console.log(bvl_result);`)" title="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
              <path d="M216,32H88A16,16,0,0,0,72,48V72H40A16,16,0,0,0,24,88V216a16,16,0,0,0,16,16H168a16,16,0,0,0,16-16V192h32a16,16,0,0,0,16-16V48A16,16,0,0,0,216,32ZM160,208H48V96H160Zm48-40H184V88a16,16,0,0,0-16-16H96V48H208Z"/>
          </svg>
      </button>
  
          <code>
  var bvl_result = document.getElementById("page-container-wrapper").outerHTML;
  console.log(bvl_result);
          </code>
      </div>
  </div>
  
  <div class="code-container">
      <div class="code-label">Lấy nội dung của header trang web</div>
  
      <div class="code-box">
        <button class="copy-btn" onclick="copyTextExec(`console.log(document.head.outerHTML);`)" title="Copy">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
                <path d="M216,32H88A16,16,0,0,0,72,48V72H40A16,16,0,0,0,24,88V216a16,16,0,0,0,16,16H168a16,16,0,0,0,16-16V192h32a16,16,0,0,0,16-16V48A16,16,0,0,0,216,32ZM160,208H48V96H160Zm48-40H184V88a16,16,0,0,0-16-16H96V48H208Z"/>
            </svg>
        </button>
  
          <code>
  console.log(document.head.outerHTML);
          </code>
      </div>
  </div>
   <script>
    function copyTextExec(s) {
        const ta = document.createElement("textarea");
        ta.value = s;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
    }
    </script>
  </body>
</html>
